<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1E3570">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Skillbase">
<meta name="description" content="Your home base for AI skills and agents">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-512.svg">
<title>Skillbase</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<link rel="stylesheet" href="/style.css?v=1782170399">
</head>
<body>
<div id="app">
  <div class="sidebar expanded" id="sidebar" style="position:relative;">
    <div class="resize-handle" id="resize-handle"></div>
    <div class="sidebar-inner">
      <div class="sbar-top">
        <h2>Library</h2>
        <div class="search-wrap">
          <input type="text" id="search" placeholder="Search…" oninput="rerender()">
        </div>
      </div>
      <div class="type-filter">
        <button class="type-btn active" onclick="setType('all',this)">All</button>
        <button class="type-btn" onclick="setType('agent',this)">Agents</button>
        <button class="type-btn" onclick="setType('skill',this)">Skills</button>
      </div>
      <div class="item-list" id="item-list"></div>

      <!-- Add buttons + folder — in library section -->
      <div style="padding:4px 10px 2px;">
        <button class="add-folder-btn" onclick="addFolder()"><i class="ti ti-folder-plus" style="font-size:13px"></i> New folder</button>
      </div>
      <div class="add-btns">
        <button class="add-btn" onclick="addNew('agent')"><i class="ti ti-plus" style="font-size:12px"></i> Agent</button>
        <button class="add-btn" onclick="addNew('skill')"><i class="ti ti-plus" style="font-size:12px"></i> Skill</button>
      </div>

      <!-- Drag handle between library and maps -->
      <div id="map-section-resizer" style="height:8px;margin:2px 0;cursor:ns-resize;display:flex;align-items:center;justify-content:center;flex-shrink:0;border-radius:4px;transition:background .12s;" title="Drag to resize maps section"
        onmouseover="this.style.background='var(--bg-hover)'" onmouseout="if(!this.classList.contains('dragging'))this.style.background=''">
        <div style="width:32px;height:3px;background:var(--border-mid);border-radius:2px;"></div>
      </div>

      <!-- Maps section -->
      <div class="maps-section">
        <div class="maps-section-header" onclick="toggleMapsSection()" style="cursor:pointer;user-select:none;">
          <span class="maps-section-title">Maps</span>
          <div style="display:flex;align-items:center;gap:4px;">
            <button class="map-new-btn" onclick="event.stopPropagation();newMap()" title="New map"><i class="ti ti-plus" style="font-size:11px"></i> New</button>
            <i class="ti ti-chevron-up" id="maps-chevron" style="font-size:12px;color:var(--text-muted);transition:transform .2s;"></i>
          </div>
        </div>
        <div id="maps-body">
          <div class="map-list" id="map-list"></div>
          <div style="padding:2px 0 4px;">
            <button class="add-folder-btn" onclick="addMapFolder()" style="font-size:11px;"><i class="ti ti-folder-plus" style="font-size:12px"></i> New map folder</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="main">
    <div class="topbar" id="topbar" style="display:none;"></div>
    <div id="content-area" style="flex:1;display:flex;flex-direction:column;overflow:hidden;">
      <div class="no-select">Select an agent or skill to view</div>
    </div>
  </div>
</div>

<div class="install-banner" id="install-banner">
  <span>Add Skillbase to your dock</span>
  <button onclick="installApp()">Install</button>
  <button class="dismiss" onclick="document.getElementById('install-banner').classList.remove('show')">×</button>
</div>

<script src="/map.js?v=1782170399"></script>
<script src="/app.js?v=1782170399"></script>
</body>
</html>
