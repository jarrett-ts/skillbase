<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1E3570">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Skillbase">
<meta name="description" content="Your home base for AI skills and agents">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-512.svg">
<title>Skillbase</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<link rel="stylesheet" href="/style.css">
</head>
<body>

<div id="app">
  <div class="sidebar expanded" id="sidebar" style="position:relative;">
    <div class="resize-handle" id="resize-handle"></div><div class="sidebar-inner">
      <div class="sbar-top">
        <h2>Library</h2>
        <div class="search-wrap">
          <input type="text" id="search" placeholder="Search…" oninput="rerender()">
        </div>
      </div>
      <div class="lib-tabs">
        <button class="lib-tab active" id="tab-personal" onclick="setLib('personal')">
          <i class="ti ti-user" style="font-size:12px"></i> Mine
          <span class="count-pill" id="cnt-personal">0</span>
        </button>
        <button class="lib-tab" id="tab-shared" onclick="setLib('shared')">
          <i class="ti ti-users" style="font-size:12px"></i> Team
          <span class="count-pill" id="cnt-shared">0</span>
        </button>
      </div>
      <div class="type-filter">
        <button class="type-btn active" onclick="setType('all',this)">All</button>
        <button class="type-btn" onclick="setType('agent',this)">Agents</button>
        <button class="type-btn" onclick="setType('skill',this)">Skills</button>
      </div>
      <div class="item-list" id="item-list"></div>
      <div style="padding:4px 10px 0;">
        <button class="add-folder-btn" onclick="addFolder()"><i class="ti ti-folder-plus" style="font-size:13px"></i> New folder</button>
      </div>
      <div class="add-btns">
        <button class="add-btn" onclick="addNew('agent')"><i class="ti ti-plus" style="font-size:12px"></i> Agent</button>
        <button class="add-btn" onclick="addNew('skill')"><i class="ti ti-plus" style="font-size:12px"></i> Skill</button>
      </div>
    </div>
  </div>
  <div class="main">
    <div class="topbar" id="topbar">
      <div class="topbar-left">
        <button class="icon-btn" onclick="toggleSidebar()"><i class="ti ti-layout-sidebar"></i></button>
        <span style="font-size:14px;color:var(--text-muted)">Select an item</span>
      </div>
    </div>
    <div id="content-area" style="flex:1;display:flex;flex-direction:column;overflow:hidden;">
      <div class="no-select">Select an agent or skill to view</div>
    </div>
  </div>
</div>

<div class="install-banner" id="install-banner">
  <span>Add Skillbase to your dock</span>
  <button onclick="installApp()">Install</button>
  <button class="dismiss" onclick="document.getElementById('install-banner').classList.remove('show')">×</button>
</div>


<script src="/app.js"></script>
</body>
</html>
